name: Build Stride Docs - Test Build

env:
  COMMON_SETTINGS_PATH: en/docfx.json
  VERSION: "2.0.0.${{ github.run_number }}"
  DOCS_PATH: stride-docs

on:
  workflow_dispatch:
    inputs:
      skipPdfBuilding:
        description: Skip PDF building
        required: true
        default: 'Yes'
        type: choice
        options:
          - 'Yes'
          - 'No'
      skipApiBuilding:
        description: Skip API building
        required: true
        default: 'Yes'
        type: choice
        options:
          - 'Yes'
          - 'No'

jobs:
  build:
    name: Build documentation
    runs-on: windows-latest

    steps:
    - name: Checkout Stride Docs
      uses: actions/checkout@v6
      with:
        path: ${{ env.DOCS_PATH }}
        lfs: true

    - name: Run Global Setup
      id: setup
      uses: ./${{ env.DOCS_PATH }}/.github/actions/setup-stride
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        skip-pdf-building: ${{ github.event.inputs.skipPdfBuilding }}
        skip-api-building: ${{ github.event.inputs.skipApiBuilding }}

    - name: Compress artifact
      run: 7z a -r DocFX-app.zip ./${{ env.DOCS_PATH }}/_site/*

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v6
      with:
        name: DocFX-app
        path: DocFX-app.zip